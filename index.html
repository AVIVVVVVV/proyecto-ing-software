<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Administración del Balneario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="frontend/css/styles.css">
</head>

<body class="login-bg">

    <main class="container d-flex justify-content-center align-items-center min-vh-100">

        <div class="card login-card p-4 p-md-5 shadow">
            <h2 class="text-center mb-4 login-title">Iniciar Sesión</h2>

            <form action="backend/procesar_login.php" method="POST">

                <div class="mb-3">
                    <label for="userEmail" class="form-label custom-label">Correo Electrónico o Usuario</label>
                    <input type="text" name="identificador" class="form-control custom-input" id="userEmail"
                        placeholder="Ingresa tu correo o usuario" required>
                </div>

                <div class="mb-4">
                    <label for="userPassword" class="form-label custom-label">Contraseña</label>
                    <input type="password" name="password" class="form-control custom-input" id="userPassword"
                        placeholder="Ingresa tu contraseña" required>
                </div>

                <div id="mensajeErrorLogin" class="alert alert-danger d-none text-center py-2 small" role="alert">
                    Usuario o contraseña incorrectos.
                </div>

                <button type="submit" class="btn w-100 custom-btn-primary">ENTRAR AL SISTEMA</button>
            </form>

        </div>

    </main>

    <script>
    // Este script revisa si la dirección de la página tiene la señal "?error=1"
    document.addEventListener("DOMContentLoaded", () => {
        const parametrosURL = new URLSearchParams(window.location.search);
        if (parametrosURL.get('error') === '1') {
            // Si hay error, quitamos la clase 'd-none' para que el mensaje rojo se vea
            document.getElementById('mensajeErrorLogin').classList.remove('d-none');
            
            // Opcional: Limpiar la URL para que se vea bonita de nuevo (sin recargar)
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    });
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
